<!DOCTYPE html>
<html class="dark scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In | MonksTrip</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        secondary: "#f97316",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        playfair: ["Playfair Display", "serif"],
                        display: ["Montero", "Manrope", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        .auth-bg {
            background-image: url('images/img_4.jpg');
            background-size: cover;
            background-position: center;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="font-display bg-background-dark text-slate-100 h-screen flex relative overflow-hidden">
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0 auth-bg"></div>
    <div class="absolute inset-0 z-0 bg-slate-950/60 mix-blend-multiply"></div>

    <div class="relative z-10 flex flex-col w-full h-full max-w-7xl mx-auto px-6 py-8">
        <!-- Logo -->
        <a href="../index.html" class="flex items-center gap-2 mb-8 md:mb-0 w-fit">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-xl">terrain</span>
            </div>
            <span class="text-2xl font-extrabold tracking-tight font-serif italic text-white">Monks<span
                    class="text-primary not-italic font-sans">Trip</span></span>
        </a>

        <!-- Auth Container -->
        <div class="flex-grow flex items-center justify-center w-full">
            <div
                class="glass-panel w-full max-w-md p-10 rounded-[2rem] shadow-2xl animate-fade-in relative overflow-hidden">

                <!-- Glow effect -->
                <div
                    class="absolute top-0 right-0 w-64 h-64 bg-primary/20 rounded-full blur-[80px] pointer-events-none -mr-20 -mt-20">
                </div>

                <div id="auth-form-container" class="relative z-10 transition-all duration-300">
                    <div class="text-center mb-10">
                        <h1 id="auth-title" class="text-3xl font-serif font-bold text-white mb-2">Welcome Back</h1>
                        <p id="auth-subtitle" class="text-slate-400 text-sm">Sign in to access your curated journeys.
                        </p>
                    </div>

                    <form id="auth-form" class="space-y-6">
                        <div id="name-field" class="hidden space-y-2">
                            <label for="fullName" class="text-xs font-bold uppercase tracking-wider text-slate-400">Full
                                Name</label>
                            <input type="text" id="fullName"
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600"
                                placeholder="John Doe">
                        </div>

                        <div class="space-y-2">
                            <label for="email" class="text-xs font-bold uppercase tracking-wider text-slate-400">Email
                                Address</label>
                            <input type="email" id="email" required
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600"
                                placeholder="you@example.com">
                        </div>

                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label for="password"
                                    class="text-xs font-bold uppercase tracking-wider text-slate-400">Password</label>
                                <a href="#" id="forgot-password-link"
                                    class="text-xs text-primary hover:underline transition-all">Forgot password?</a>
                            </div>
                            <input type="password" id="password" required
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600"
                                placeholder="••••••••">
                        </div>

                        <!-- Error/Success Message Container -->
                        <div id="auth-message" class="hidden text-sm p-3 rounded-lg border"></div>

                        <button type="submit" id="submit-btn"
                            class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                            <span>Sign In</span>
                            <span class="material-symbols-outlined text-sm hidden" id="loading-spinner">sync</span>
                        </button>
                    </form>

                    <div class="mt-8 text-center text-sm text-slate-400">
                        <span id="toggle-text">Don't have an account?</span>
                        <button id="toggle-mode-btn"
                            class="text-primary font-bold hover:underline ml-1 focus:outline-none transition-all">Create
                            one</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../lib/supabase-client.js';

        let isSignUpMode = false;

        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const nameInput = document.getElementById('fullName');
        const nameField = document.getElementById('name-field');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = submitBtn.querySelector('span:first-child');
        const spinner = document.getElementById('loading-spinner');
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const toggleBtn = document.getElementById('toggle-mode-btn');
        const toggleText = document.getElementById('toggle-text');
        const forgotPasswordLink = document.getElementById('forgot-password-link');
        const messageBox = document.getElementById('auth-message');

        // Toggle between Sign In and Sign Up modes
        toggleBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;

            // Clear errors
            messageBox.classList.add('hidden');

            if (isSignUpMode) {
                title.textContent = 'Join MonksTrip';
                subtitle.textContent = 'Start planning your unforgettable journey.';
                btnText.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account?';
                toggleBtn.textContent = 'Sign In';
                nameField.classList.remove('hidden');
                nameInput.required = true;
                forgotPasswordLink.classList.add('hidden');
            } else {
                title.textContent = 'Welcome Back';
                subtitle.textContent = 'Sign in to access your curated journeys.';
                btnText.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleBtn.textContent = 'Create one';
                nameField.classList.add('hidden');
                nameInput.required = false;
                forgotPasswordLink.classList.remove('hidden');
            }
        });

        function showMessage(type, message) {
            messageBox.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/50', 'text-red-400', 'bg-green-500/10', 'border-green-500/50', 'text-green-400');

            if (type === 'error') {
                messageBox.classList.add('bg-red-500/10', 'border-red-500/50', 'text-red-400');
            } else {
                messageBox.classList.add('bg-green-500/10', 'border-green-500/50', 'text-green-400');
            }

            messageBox.textContent = message;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Re-hide message and show loading UI
            messageBox.classList.add('hidden');
            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            spinner.classList.add('animate-spin');

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                if (isSignUpMode) {
                    const fullName = nameInput.value;
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: {
                            data: {
                                full_name: fullName,
                            }
                        }
                    });

                    if (error) throw error;

                    if (data?.user?.identities?.length === 0) {
                        showMessage('error', 'An account with this email already exists and is unverified. Please check your email or try signing in.');
                    } else if (data?.session) {
                        // Session established immediately
                        window.location.href = 'dashboard.html';
                    } else {
                        showMessage('success', 'Registration successful! Please check your email to verify your account before logging in.');
                        // Switch to sign in mode
                        toggleBtn.click();
                    }

                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email,
                        password,
                    });

                    if (error) throw error;

                    // Specific logic for Supabase success behavior
                    if (data.session) {
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (err) {
                showMessage('error', err.message);
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
                spinner.classList.remove('animate-spin');
            }
        });

        // Auto-redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
