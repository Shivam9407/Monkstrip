<!DOCTYPE html>
<html class="dark scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In | MonksTrip</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        secondary: "#f97316",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        playfair: ["Playfair Display", "serif"],
                        display: ["Montero", "Manrope", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        .auth-bg {
            background-image: url('../assets/images/img_4.jpg');
            background-size: cover;
            background-position: center;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .google-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
    </style>
</head>

<body class="font-display bg-background-dark text-slate-100 h-screen flex relative overflow-hidden">
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0 auth-bg"></div>
    <div class="absolute inset-0 z-0 bg-slate-950/60 mix-blend-multiply"></div>

    <div class="relative z-10 flex flex-col w-full h-full max-w-7xl mx-auto px-6 py-8">
        <!-- Logo -->
        <a href="../index.html" class="flex items-center gap-2 mb-8 md:mb-0 w-fit">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-xl">terrain</span>
            </div>
            <span class="text-2xl font-extrabold tracking-tight font-serif italic text-white">Monks<span
                    class="text-primary not-italic font-sans">Trip</span></span>
        </a>

        <!-- Auth Container -->
        <div class="flex-grow flex items-center justify-center w-full">
            <div class="glass-panel w-full max-w-md p-10 rounded-[2rem] shadow-2xl relative overflow-hidden">

                <!-- Glow effect -->
                <div
                    class="absolute top-0 right-0 w-64 h-64 bg-primary/20 rounded-full blur-[80px] pointer-events-none -mr-20 -mt-20">
                </div>

                <div id="auth-form-container" class="relative z-10">
                    <div class="text-center mb-8">
                        <h1 id="auth-title" class="text-3xl font-serif font-bold text-white mb-2">Welcome Back</h1>
                        <p id="auth-subtitle" class="text-slate-400 text-sm">Sign in to access your curated journeys.
                        </p>
                    </div>

                    <!-- Google Sign-In Button -->
                    <button id="google-btn"
                        class="google-btn w-full flex items-center justify-center gap-3 py-3 rounded-xl mb-6 text-white font-medium text-sm cursor-pointer">
                        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                            <path fill="none" d="M0 0h48v48H0z" />
                        </svg>
                        Continue with Google
                    </button>

                    <!-- Divider -->
                    <div class="flex items-center gap-4 mb-6">
                        <div class="flex-1 h-px bg-slate-700"></div>
                        <span class="text-slate-500 text-xs font-medium">OR</span>
                        <div class="flex-1 h-px bg-slate-700"></div>
                    </div>

                    <form id="auth-form" class="space-y-5">
                        <div id="name-field" class="hidden space-y-2">
                            <label for="fullName" class="text-xs font-bold uppercase tracking-wider text-slate-400">Full
                                Name</label>
                            <input type="text" id="fullName"
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600"
                                placeholder="John Doe">
                        </div>

                        <div class="space-y-2">
                            <label for="email" class="text-xs font-bold uppercase tracking-wider text-slate-400">Email
                                Address</label>
                            <input type="email" id="email" required
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600"
                                placeholder="you@example.com">
                        </div>

                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label for="password"
                                    class="text-xs font-bold uppercase tracking-wider text-slate-400">Password</label>
                                <button type="button" id="forgot-password-link"
                                    class="text-xs text-primary hover:underline transition-all focus:outline-none">Forgot
                                    password?</button>
                            </div>
                            <input type="password" id="password" required
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600"
                                placeholder="••••••••">
                        </div>

                        <!-- Error/Success Message -->
                        <div id="auth-message" class="hidden text-sm p-3 rounded-lg border"></div>

                        <button type="submit" id="submit-btn"
                            class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                            <span id="btn-label">Sign In</span>
                            <span class="material-symbols-outlined text-sm hidden spin" id="loading-spinner">sync</span>
                        </button>
                    </form>

                    <div class="mt-6 text-center text-sm text-slate-400">
                        <span id="toggle-text">Don't have an account?</span>
                        <button id="toggle-mode-btn"
                            class="text-primary font-bold hover:underline ml-1 focus:outline-none transition-all">Create
                            one</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            auth, db, googleProvider,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            signInWithPopup,
            updateProfile,
            onAuthStateChanged,
            createUserProfile
        } from '../lib/firebase-client.js';

        let isSignUpMode = false;

        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const nameInput = document.getElementById('fullName');
        const nameField = document.getElementById('name-field');
        const submitBtn = document.getElementById('submit-btn');
        const btnLabel = document.getElementById('btn-label');
        const spinner = document.getElementById('loading-spinner');
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const toggleBtn = document.getElementById('toggle-mode-btn');
        const toggleText = document.getElementById('toggle-text');
        const forgotBtn = document.getElementById('forgot-password-link');
        const msgBox = document.getElementById('auth-message');
        const googleBtn = document.getElementById('google-btn');

        // If already authenticated, skip to dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });

        // ── Toggle Sign In / Sign Up ──────────────────────
        toggleBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            msgBox.classList.add('hidden');
            if (isSignUpMode) {
                title.textContent = 'Join MonksTrip';
                subtitle.textContent = 'Start planning your unforgettable journey.';
                btnLabel.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account?';
                toggleBtn.textContent = 'Sign In';
                nameField.classList.remove('hidden');
                nameInput.required = true;
                forgotBtn.classList.add('hidden');
            } else {
                title.textContent = 'Welcome Back';
                subtitle.textContent = 'Sign in to access your curated journeys.';
                btnLabel.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleBtn.textContent = 'Create one';
                nameField.classList.add('hidden');
                nameInput.required = false;
                forgotBtn.classList.remove('hidden');
            }
        });

        // ── Message helper ────────────────────────────────
        function showMessage(type, text) {
            msgBox.classList.remove('hidden',
                'bg-red-500/10', 'border-red-500/50', 'text-red-400',
                'bg-green-500/10', 'border-green-500/50', 'text-green-400');
            msgBox.classList.add(
                type === 'error'
                    ? 'bg-red-500/10' : 'bg-green-500/10',
                type === 'error'
                    ? 'border-red-500/50' : 'border-green-500/50',
                type === 'error'
                    ? 'text-red-400' : 'text-green-400'
            );
            msgBox.textContent = text;
        }

        // ── Loading state helpers ─────────────────────────
        function setLoading(on) {
            submitBtn.disabled = on;
            spinner.classList.toggle('hidden', !on);
        }

        // ── Email / Password Submit ───────────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgBox.classList.add('hidden');
            setLoading(true);
            const email = emailInput.value.trim();
            const password = passInput.value;

            try {
                if (isSignUpMode) {
                    const fullName = nameInput.value.trim();
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: fullName });
                    await createUserProfile(cred.user, { displayName: fullName });
                    window.location.href = 'dashboard.html';
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                const msgs = {
                    'auth/email-already-in-use': 'An account with this email already exists.',
                    'auth/weak-password': 'Password must be at least 6 characters.',
                    'auth/invalid-credential': 'Invalid email or password.',
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/wrong-password': 'Incorrect password.',
                    'auth/too-many-requests': 'Too many attempts. Please try again later.',
                };
                showMessage('error', msgs[err.code] || err.message);
            } finally {
                setLoading(false);
            }
        });

        // ── Google Sign-In ────────────────────────────────
        googleBtn.addEventListener('click', async () => {
            try {
                googleBtn.disabled = true;
                googleBtn.textContent = 'Signing in...';
                const result = await signInWithPopup(auth, googleProvider);
                await createUserProfile(result.user);
                window.location.href = 'dashboard.html';
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showMessage('error', err.message);
                }
                googleBtn.disabled = false;
                googleBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg> Continue with Google`;
            }
        });

        // ── Forgot Password ───────────────────────────────
        forgotBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email) {
                showMessage('error', 'Enter your email address above first.');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage('success', 'Password reset email sent! Check your inbox.');
            } catch (err) {
                showMessage('error', err.message);
            }
        });
    </script>
</body>

</html>
